<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TraderCRM — Creator Acquisition</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
</head>
<body class="min-h-screen flex">
<button class="mobile-toggle" onclick="toggleSidebar()" style="display:none;">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
</button>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<div id="conn-banner" class="conn-banner" style="display:none;">
  Server disconnected
</div>

<div id="toasts" style="position:fixed;top:16px;right:16px;z-index:50;display:flex;flex-direction:column;gap:8px;pointer-events:none;"></div>

<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">

</div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
    </div>
    <div>
      <div class="brand-name">TraderCRM</div>
      <div class="brand-sub">Creator Acquisition</div>
    </div>
  </div>
  <nav id="nav-items">
    <div data-page="dashboard" onclick="navigate('dashboard')" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9"/><path d="M21 3v9h-9"/></svg>
      <span>Dashboard</span>
    </div>
    <div data-page="traders" onclick="navigate('traders')" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Traders</span>
    </div>
    <div data-page="discovery" onclick="navigate('discovery')" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
      <span>Discovery</span>
    </div>
    <div data-page="settings" onclick="navigate('settings')" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <span>Settings</span>
    </div>
  </nav>
  <div class="sidebar-stats" id="sidebar-stats"></div>
  <div style="padding:8px 10px;border-top:0.5px solid var(--separator);">
    <button class="theme-toggle" onclick="toggleTheme()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="theme-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span id="theme-text">Dark Mode</span>
    </button>
  </div>
</aside>

<main id="content" class="flex-1" style="overflow-y:auto;min-height:100vh;padding:24px 32px;"></main>

<script>
const state = {
  currentPage: 'dashboard',
  selectedTraderId: null,
  filters: { status: 'all', platform: 'all', minFit: 0, search: '' },
  sort: 'date_added DESC',
  traders: [],
  stats: {},
  settings: {},
  lastSeenTraderId: null,
  serverConnected: true,
  discoveryTab: 'paste',
};

const API = {
  async getTraders(params) {
    const url = new URL('/api/traders', window.location.origin);
    Object.keys(params).forEach(k => params[k] && url.searchParams.append(k, params[k]));
    const res = await fetch(url);
    return res.json();
  },
  async getTrader(id) { return (await fetch(`/api/traders/${id}`)).json(); },
  async createTrader(data) { return (await fetch('/api/traders', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})).json(); },
  async updateTrader(id, data) { return (await fetch(`/api/traders/${id}`, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})).json(); },
  async deleteTrader(id) { return (await fetch(`/api/traders/${id}`, {method:'DELETE'})).json(); },
  async getStats() { return (await fetch('/api/traders/stats')).json(); },
  async logOutreach(id, data) { return (await fetch(`/api/traders/${id}/outreach`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})).json(); },
  async getSettings() { return (await fetch('/api/settings')).json(); },
  async saveSettings(data) { return (await fetch('/api/settings', {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})).json(); },
  async exportData() { return (await fetch('/api/export')).json(); },
  async importData(data) { return (await fetch('/api/import', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})).json(); },
};

const Utils = {
  formatDate(iso) { if(!iso) return ''; const d=new Date(iso); return d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); },
  formatRelative(iso) { if(!iso) return ''; const d=new Date(iso); const sec=Math.floor((Date.now()-d)/1000); if(sec<60) return 'just now'; if(sec<3600) return Math.floor(sec/60)+'m ago'; if(sec<86400) return Math.floor(sec/3600)+'h ago'; return Math.floor(sec/86400)+'d ago'; },
  platformColor(p) { const map={'eToro':'var(--platform-etoro)','MQL5':'var(--platform-mql5)','TradingView':'var(--platform-tradingview)','ZuluTrade':'var(--platform-zulutrade)','Myfxbook':'var(--platform-myfxbook)','Darwinex':'var(--platform-darwinex)','NAGA':'var(--platform-naga)','FXBlue':'var(--platform-fxblue)','Telegram':'var(--platform-telegram)','Twitter':'var(--platform-twitter)','Discord':'var(--platform-discord)','Manual':'var(--platform-manual)'}; return map[p]||'var(--platform-manual)'; },
  fitColor(s){ return s>=70?'var(--sys-green)':s>=50?'var(--sys-yellow)':'var(--sys-red)'; },
  statusColor(s){ const m={'Trader Found':'var(--label-quaternary)','Researching':'var(--sys-blue)','Contacted':'var(--sys-teal)','Replied':'var(--sys-green)','Interested':'var(--sys-green)','Meeting Scheduled':'var(--sys-orange)','Negotiation':'var(--sys-purple)','Onboarding':'#a17dc9','Active Creator':'var(--sys-green)','Rejected':'var(--sys-red)','No Response':'var(--label-quaternary)'}; return m[s]||'var(--label-quaternary)'; },
  hashColor(str) {
    let hash = 0;
    for(let i=0; i<str.length; i++){
      hash = str.charCodeAt(i) + ((hash << 5) - hash);
      hash = hash & hash;
    }
    const hue = Math.abs(hash) % 360;
    return `hsl(${hue}, 65%, 45%)`;
  },
  escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  },
  parseTraderProfile(text) {
    const result = {trader_name:'',platform:'Manual',location:'',language:'',strategy_type:'',twitter:'',telegram:'',discord:'',youtube:'',website:'',monthly_return:0,yearly_return:0,followers:0,copiers:0,assets_under_management:0,maximum_drawdown:0,risk_score:0};
    const lines = text.trim().split('\n');
    for(let line of lines){
      line=line.trim();
      if(!line||!line.includes(':'))continue;
      const [k,...v]=line.split(':'); const key=k.trim().toLowerCase(); const val=v.join(':').trim();
      if(key.includes('trader')||key.includes('name')) result.trader_name=val;
      else if(key.includes('platform')) result.platform=val;
      else if(key.includes('location')) result.location=val;
      else if(key.includes('language')) result.language=val;
      else if(key.includes('strategy')) result.strategy_type=val;
      else if(key.includes('twitter')) result.twitter=val.replace('@','');
      else if(key.includes('telegram')) result.telegram=val;
      else if(key.includes('discord')) result.discord=val;
      else if(key.includes('youtube')) result.youtube=val;
      else if(key.includes('website')||key.includes('url')) result.website=val;
      else if(key.includes('monthly')&&key.includes('return')){ const m=val.match(/[-+]?[\d,.]+%?/); if(m) result.monthly_return=parseFloat(m[0].replace('%','').replace(',','')); }
      else if(key.includes('yearly')&&key.includes('return')){ const m=val.match(/[-+]?[\d,.]+%?/); if(m) result.yearly_return=parseFloat(m[0].replace('%','').replace(',','')); }
      else if(key.includes('followers')){ const m=val.replace(/,/g,'').match(/\d+/); if(m) result.followers=parseInt(m[0]); }
      else if(key.includes('copiers')){ const m=val.replace(/,/g,'').match(/\d+/); if(m) result.copiers=parseInt(m[0]); }
      else if(key.includes('aum')||key.includes('assets')){ const m=val.replace(/,/g,'').match(/[\d,.]+/); if(m) result.assets_under_management=parseFloat(m[0]); }
      else if(key.includes('drawdown')){ const m=val.match(/[\d,.]+%?/); if(m) result.maximum_drawdown=parseFloat(m[0].replace('%','')); }
      else if(key.includes('risk')&&key.includes('score')){ const m=val.match(/\d+/); if(m) result.risk_score=parseInt(m[0]); }
    }
    return result;
  }
};

let _interestDebounce = null;
let keyboardHandler = null;

const VALID_STATUSES = ['Trader Found','Researching','Contacted','Replied','Interested','Meeting Scheduled','Negotiation','Onboarding','Active Creator','Rejected','No Response'];
const VALID_STAGES = ['Research','Outreach','Follow-up','Interview','Due Diligence','Contract','Setup','Active','Closed'];

function setState(updates){ Object.assign(state,updates); render(); }

function showToast(msg, type='info'){ const el=document.createElement('div'); el.className='toast'; el.style.borderLeft=`3px solid ${type==='error'?'var(--sys-red)':'var(--sys-green)'}`; el.innerHTML=msg; document.getElementById('toasts').appendChild(el); setTimeout(()=>el.remove(),3000); }

function showModal(content){ document.getElementById('modal-content').innerHTML=content; document.getElementById('modal-overlay').classList.remove('hidden'); }
function closeModal(){ document.getElementById('modal-overlay').classList.add('hidden'); }

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('open'); document.querySelector('.mobile-toggle').style.display = document.getElementById('sidebar').classList.contains('open') ? 'flex' : 'none'; }

function toggleTheme(){ document.body.classList.toggle('light-mode'); const icon=document.getElementById('theme-icon'); const txt=document.getElementById('theme-text'); if(document.body.classList.contains('light-mode')){ icon.innerHTML='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'; txt.textContent='Light Mode'; } else { icon.innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'; txt.textContent='Dark Mode'; } }

function updateConnectionBanner(){ document.getElementById('conn-banner').style.display=state.serverConnected?'none':'block'; }

async function pollNewTraders(){ try{ const res=await fetch('/api/traders?sort=date_added%20DESC'); if(!res.ok) throw new Error(); const traders=await res.json(); if(traders.length && state.lastSeenTraderId!==traders[0].id){ state.lastSeenTraderId=traders[0].id; showToast(`New trader: ${traders[0].trader_name}`); await refreshData(); } } catch(e){ state.serverConnected=false; updateConnectionBanner(); } }

async function refreshData(){ try{ const [traders,stats,settings]=await Promise.all([API.getTraders({status:state.filters.status,platform:state.filters.platform,min_fit:state.filters.min_fit,search:state.filters.search,sort:state.sort}), API.getStats(), API.getSettings()]); state.traders=traders; state.stats=stats; state.settings=settings; state.serverConnected=true; updateConnectionBanner(); updateSidebarStats(); }catch(e){ state.serverConnected=false; updateConnectionBanner(); } }

function navigate(page,params={}){
  state.currentPage=page;
  state.selectedTraderId=params.traderId||null;
  
  if(keyboardHandler) document.removeEventListener('keydown', keyboardHandler);
  
  if(page!=='traders') state.filters.search='';
  render();
  
  if(page==='traders'||page==='trader'){
    setupKeyboardShortcuts();
  }
  
  if(page==='traders'&&!state.traders.length) refreshData();
}

async function render(){
  document.getElementById('content').innerHTML='';
  switch(state.currentPage){
    case 'dashboard': renderDashboard(); break;
    case 'traders': renderTradersList(); break;
    case 'trader': await renderTraderDetail(); break;
    case 'discovery': renderDiscovery(); break;
    case 'settings': renderSettings(); break;
  }
  updateNavActive();
}

function updateNavActive(){ document.querySelectorAll('.nav-item').forEach(el=>{ el.classList.toggle('active',el.dataset.page===state.currentPage||(state.currentPage==='trader'&&el.dataset.page==='traders')); }); }

function setupKeyboardShortcuts(){
  if(keyboardHandler) document.removeEventListener('keydown', keyboardHandler);
  
  keyboardHandler = function(e){
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
    if(e.altKey||e.ctrlKey||e.metaKey) return;
    
    if(state.currentPage==='traders'){
      const list = state.traders;
      const idx = list.findIndex(t=>t.id===state.selectedTraderId);
      
      if(e.key==='j'||e.key==='ArrowDown'){
        e.preventDefault();
        const next = idx<list.length-1 ? idx+1 : 0;
        state.selectedTraderId = list[next].id;
        renderTradersList();
      }
      if(e.key==='k'||e.key==='ArrowUp'){
        e.preventDefault();
        const prev = idx>0 ? idx-1 : list.length-1;
        state.selectedTraderId = list[prev].id;
        renderTradersList();
      }
      if(e.key==='Enter'&&state.selectedTraderId){
        navigate('trader',{traderId:state.selectedTraderId});
      }
      if(e.key==='n'){
        navigate('discovery');
      }
    }
    
    if(state.currentPage==='trader'){
      if(e.key==='Escape'){
        navigate('traders');
      }
      if(e.key==='d'){
        const t = state.traders.find(t=>t.id===state.selectedTraderId);
        if(t) quickStatus('Contacted');
      }
    }
  };
  
  document.addEventListener('keydown', keyboardHandler);
}

function updateSidebarStats(){ const s=state.stats; document.getElementById('sidebar-stats').innerHTML=`<div class="stat-label">Pipeline</div><div class="stat-value">${s.total||0}</div><div class="stat-detail">Traders total</div><div class="stat-detail" style="margin-top:8px">Active: ${s.active_pipeline||0}</div><div class="stat-detail">Reply rate: ${s.reply_rate||0}%</div><div class="stat-detail">Outreach: ${s.total_outreach||0}</div>`; }

// ========== PAGES ==========

function renderDashboard(){
  const {total=0,active_pipeline=0,total_outreach=0,reply_rate=0,by_platform={},by_status={},conversion_rate=0}=state.stats;
  const platforms=Object.entries(by_platform).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const statusOrder=['Trader Found','Researching','Contacted','Replied','Interested','Meeting Scheduled','Negotiation','Onboarding','Active Creator','Rejected','No Response'];
  const highPriority=state.traders.filter(t=>t.fit_score>=70).slice(0,5);

  let html=`<div style="padding:24px"><h1 style="font-size:22px;font-weight:700;margin-bottom:24px">Dashboard</h1>`;

  html+=`<div class="stats-row">`;
  html+=`<div class="stat-card"><div class="value">${total}</div><div class="label">Total Traders</div></div>`;
  html+=`<div class="stat-card"><div class="value">${active_pipeline}</div><div class="label">Active Pipeline</div></div>`;
  html+=`<div class="stat-card"><div class="value">${total_outreach}</div><div class="label">Outreach Attempts</div></div>`;
  html+=`<div class="stat-card"><div class="value" style="color:var(--sys-green)">${reply_rate}%</div><div class="label">Reply Rate</div></div>`;
  html+=`</div>`;

  html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">`;

  html+=`<div class="surface" style="padding:20px"><h2 style="font-size:15px;font-weight:600;margin-bottom:16px">Pipeline Funnel</h2><div style="display:flex;flex-direction:column;gap:12px">`;
  statusOrder.forEach(st=>{
    const count=by_status[st]||0; const pct=total>0?count/total*100:0;
    html+=`<div><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="color:var(--label)">${st}</span><span style="color:var(--label-secondary)">${count}</span></div><div style="height:6px;border-radius:3px;background:rgba(120,120,128,0.2);overflow:hidden"><div style="height:100%;border-radius:3px;background:var(--sys-blue);width:${pct}%;transition:width 0.3s ease"></div></div></div>`;
  });
  html+=`</div></div>`;

  html+=`<div class="surface" style="padding:20px"><h2 style="font-size:15px;font-weight:600;margin-bottom:16px">Platform Distribution</h2><div style="display:flex;flex-direction:column;gap:12px">`;
  platforms.forEach(([p,c])=>{
    const pct=total>0?c/total*100:0;
    html+=`<div><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span class="platform-badge" style="background:var(--platform-${p.toLowerCase()});color:${p==='Manual'?'#000':'#fff'}">${p}</span><span style="color:var(--label-secondary)">${c}</span></div><div style="height:6px;border-radius:3px;background:rgba(120,120,128,0.2);overflow:hidden"><div style="height:100%;border-radius:3px;background:var(--platform-${p.toLowerCase()});width:${pct}%;transition:width 0.3s ease"></div></div></div>`;
  });
  html+=`</div></div>`;
  html+=`</div>`;

  html+=`<div class="surface" style="padding:20px"><h2 style="font-size:15px;font-weight:600;margin-bottom:16px">High Priority Traders (Fit ≥70)</h2>`;
  if(highPriority.length){
    html+=`<div class="grouped-list">`;
    highPriority.forEach(t=>{
      html+=`<div class="list-row" onclick="navigate('trader',{traderId:'${t.id}'})">
        <div class="avatar" style="background:var(--sys-blue)">${t.trader_name.charAt(0)}</div>
        <div class="info"><div class="name">${t.trader_name}</div><div class="meta">${t.platform} · ${(t.followers||0).toLocaleString()} followers</div></div>
        <span class="pill pill-green">${t.status}</span>
        <div class="trailing"><div class="score" style="color:var(--sys-green)">${t.fit_score}%</div><div class="score-label">Fit</div></div>
      </div>`;
    });
    html+=`</div>`;
  } else {
    html+=`<div style="color:var(--label-tertiary);font-size:13px;padding:12px 0">No high priority traders yet.</div>`;
  }
  html+=`</div></div>`;

  document.getElementById('content').innerHTML=html;
}

function renderTradersList(){
  const statusOpts=VALID_STATUSES.map(s=>`<option value="${s}">${s}</option>`).join('');
  const platformOpts=JSON.parse(state.settings['platforms.enabled']||'[]').map(p=>`<option value="${p}">${p}</option>`).join('');

  let html=`<div style="padding:24px">`;

  html+=`<div class="page-header"><div><h1>Traders</h1><div class="subtitle">${state.traders.length} traders in pipeline</div></div>`;
  html+=`<div class="actions">`;
  html+=`<div class="search-field"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input id="search-input" placeholder="Search..." value="${state.filters.search}" oninput="state.filters.search=this.value;renderTradersList();"></div>`;
  html+=`<button onclick="navigate('discovery')" class="btn btn-primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Add Trader</button>`;
  html+=`</div></div>`;

  html+=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:16px">`;
  html+=`<select id="filter-status" onchange="state.filters.status=this.value;renderTradersList();" style="width:auto;padding-right:28px"><option value="all">All Statuses</option>${statusOpts}</select>`;
  html+=`<select id="filter-platform" onchange="state.filters.platform=this.value;renderTradersList();" style="width:auto;padding-right:28px"><option value="all">All Platforms</option>${platformOpts}</select>`;
  html+=`<div style="display:flex;align-items:center;gap:6px"><label style="font-size:13px;color:var(--label-secondary)">Min Fit:</label><input type="range" id="filter-fit" min="0" max="100" value="${state.filters.minFit}" oninput="state.filters.minFit=parseInt(this.value);renderTradersList();" style="width:100px"><span style="font-size:13px;color:var(--label);min-width:24px">${state.filters.minFit}</span></div>`;
  html+=`<div style="flex:1"></div>`;
  html+=`<select id="sort-select" onchange="state.sort=this.value;refreshData().then(()=>renderTradersList())" style="width:auto;padding-right:28px"><option value="date_added DESC" ${state.sort==='date_added DESC'?'selected':''}>Newest First</option><option value="date_added ASC" ${state.sort==='date_added ASC'?'selected':''}>Oldest First</option><option value="fit_score DESC" ${state.sort==='fit_score DESC'?'selected':''}>Highest Fit</option><option value="fit_score ASC" ${state.sort==='fit_score ASC'?'selected':''}>Lowest Fit</option><option value="priority_score DESC" ${state.sort==='priority_score DESC'?'selected':''}>Highest Priority</option><option value="last_contact_date DESC" ${state.sort==='last_contact_date DESC'?'selected':''}>Recently Contacted</option></select>`;
  html+=`<span style="font-size:11px;color:var(--label-tertiary)"><span class="kbd">j</span><span class="kbd">k</span> navigate · <span class="kbd">Enter</span> open · <span class="kbd">n</span> new</span>`;
  html+=`</div>`;

  html+=`<div class="grouped-list" id="traders-list">`;
  const filtered=state.traders.filter(t=>state.filters.search===''||[t.trader_name,t.profile_url,t.research_notes,t.tags].some(f=>f&&f.toLowerCase().includes(state.filters.search.toLowerCase())));
  if(!filtered.length){
    html+=`<div style="padding:32px;text-align:center;color:var(--label-tertiary);font-size:13px">No traders found matching criteria.</div>`;
  } else {
    filtered.forEach(t=>{
      const pillClass=t.status==='Replied'||t.status==='Interested'?'pill-green':t.status==='Contacted'?'pill-blue':t.status==='Negotiation'||t.status==='Onboarding'?'pill-purple':t.status==='Rejected'?'pill-red':t.status==='Meeting Scheduled'?'pill-orange':'pill-gray';

  }
  html+=`</div></div>`;

  document.getElementById('content').innerHTML=html;
}

100%;padding:8px;border-radius:8px;background:rgba(255,69,58,0.2);color:var(--sys-red);font-size:13px;font-weight:500;border:none;cursor:pointer;margin-bottom:8px;font-family:inherit">Reject</button><button onclick="quickStatus('Active Creator')" style="width:100%;padding:8px;border-radius:8px;background:rgba(48,209,88,0.2);color:var(--sys-green);font-size:13px;font-weight:500;border:none;cursor:pointer;font-family:inherit">Mark Active</button></div><div class="surface" style="padding:20px"><h2 style="font-size:15px;font-weight:600;margin-bottom:16px">Outcome Tracking</h2><div style="display:flex;flex-direction:column;gap:16px"><div><label style="color:var(--label-secondary);font-size:13px;display:block;margin-bottom:4px">Response Received</label><select id="response-select" style="width:100%;background:var(--surface-hover);color:var(--label);font-size:13px;border-radius:6px;padding:4px 8px;border:none" onchange="updateTraderField('response_received',this.value)"><option value="No" ${trader.response_received==='No'?'selected':''}>No</option><option value="Yes" ${trader.response_received==='Yes'?'selected':''}>Yes</option></select></div><div><label style="color:var(--label-secondary);font-size:13px;display:block;margin-bottom:4px">Stage Reached</label><select id="stage-select" style="width:100%;background:var(--surface-hover);color:var(--label);font-size:13px;border-radius:6px;padding:4px 8px;border:none" onchange="updateTraderField('stage_reached',this.value)"><option value="" ${!trader.stage_reached?'selected':''}>-</option>${['No Response','Screening','Interview','Final Round','N/A'].map(s=>`<option value="${s}" ${trader.stage_reached===s?'selected':''}>${s}</option>`).join('')}</select></div></div></div><div class="surface" style="padding:20px"><h2 style="font-size:15px;font-weight:600;margin-bottom:16px">Audit Trail</h2><div style="display:flex;flex-direction:column;gap:8px;font-size:13px"><div style="display:flex;justify-content:space-between"><span style="color:var(--label-secondary)">Added</span><span style="color:var(--label)">${Utils.formatDate(trader.date_added)}</span></div><div style="display:flex;justify-content:space-between"><span style="color:var(--label-secondary)">Updated</span><span style="color:var(--label)">${Utils.formatDate(trader.date_updated)}</span></div><div style="display:flex;justify-content:space-between"><span style="color:var(--label-secondary)">First contact</span><span style="color:var(--label)">${Utils.formatDate(trader.first_contact_date)}</span></div><div style="display:flex;justify-content:space-between"><span style="color:var(--label-secondary)">Last contact</span><span style="color:var(--label)">${Utils.formatDate(trader.last_contact_date)}</span></div><div style="display:flex;justify-content:space-between"><span style="color:var(--label-secondary)">Outreach attempts</span><span style="color:var(--label)">${trader.outreach_attempts||0}</span></div></div></div></div></div></div>`;

function fetchOutreachLogs(traderId){ API.getTrader(traderId).then(t=>{ state.selectedTrader=t; const list=document.getElementById('outreach-list'); if(!list) return; list.innerHTML=t.outreach_logs?t.outreach_logs.map(l=>`<div style="font-size:13px;padding:8px;background:var(--surface-hover);border-radius:8px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-weight:500;color:var(--label)">${l.method}</span><span style="color:var(--label-tertiary);font-size:12px">${Utils.formatDate(l.date_sent)}</span></div><div style="color:var(--label-secondary);font-size:13px">${l.notes}</div></div>`).join('') : '<div style="color:var(--label-tertiary);font-size:13px">No outreach logged yet.</div>'; }); }

async function updateTraderField(field,value){ try{ await API.updateTrader(state.selectedTraderId,{[field]:value}); state.selectedTrader[field]=value; await refreshData(); }catch(e){ showToast('Failed to save: '+e.message,'error'); } }

function quickStatus(status,withReason=false){ if(withReason){ const reason=prompt('Rejection reason:'); if(reason){ API.updateTrader(state.selectedTraderId,{status,rejection_reason:reason,rejection_date:new Date().toISOString()}).then(()=>{ showToast('Status updated'); refreshData().then(()=>renderTraderDetail());}); } } else { const fieldMap={'Contacted':'first_contact_date','Replied':'date_replied','Interested':'date_interested','Meeting Scheduled':'date_meeting_scheduled','Negotiation':'date_negotiation_started','Onboarding':'date_onboarded','Active Creator':'conversion_date'}; const updates={status}; if(fieldMap[status]) updates[fieldMap[status]]=new Date().toISOString(); API.updateTrader(state.selectedTraderId,updates).then(()=>{ showToast('Status updated'); refreshData().then(()=>renderTraderDetail());}); } }

function updatePriorityPreview(){
  const fit = state.selectedTrader.fit_score || 0;
  const interest = state.selectedTrader.interest_score || 0;
  document.getElementById('priority-preview').textContent = Math.round(fit * interest / 5);
}

async function analyzeRawText(traderId, e){
  const btn = e.target;
  btn.textContent = 'Analyzing...';
  btn.disabled = true;
  try {
    const res = await fetch(`/api/traders/${traderId}/analyze`, {method:'POST'});
    if(!res.ok) throw new Error('Analysis failed');
    const data = await res.json();
    showToast(`Found ${data.keywords.length} keywords`);
    await refreshData();
    renderTraderDetail();
  } catch(e) {
    showToast('Analysis failed', 'error');
  }
}

function showOutreachModal(traderId){ const html=`<h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Log Outreach</h3><div style="display:flex;flex-direction:column;gap:16px"><div><label style="color:var(--label-secondary);font-size:13px;display:block;margin-bottom:8px">Method</label><select id="outreach-method" style="width:100%;background:var(--surface-hover);color:var(--label);font-size:13px;border-radius:8px;padding:8px 12px;border:none;outline:none;font-family:inherit"><option value="email">Email</option><option value="telegram">Telegram</option><option value="twitter_dm">Twitter DM</option><option value="discord">Discord</option><option value="linkedin">LinkedIn</option><option value="other">Other</option></select></div><div><label style="color:var(--label-secondary);font-size:13px;display:block;margin-bottom:8px">Notes</label><textarea id="outreach-notes" style="width:100%;background:var(--surface-hover);color:var(--label);font-size:13px;padding:12px;border-radius:8px;resize:none;height:96px;border:none;outline:none;font-family:inherit" placeholder="What did you send? Any response?"></textarea></div><div style="display:flex;gap:12px;margin-top:16px"><button onclick="submitOutreach('${traderId}')" class="btn btn-primary">Save</button><button onclick="closeModal()" class="btn btn-secondary">Cancel</button></div></div>`; showModal(html); }

async function submitOutreach(traderId){ const method=document.getElementById('outreach-method').value; const notes=document.getElementById('outreach-notes').value; await API.logOutreach(traderId,{method,notes}); showToast('Outreach logged'); closeModal(); refreshData().then(()=>renderTraderDetail()); }

function renderDiscovery(){
  const tab = state.discoveryTab || 'paste';
  let html = `<div style="padding:24px"><h1 style="font-size:22px;font-weight:700;margin-bottom:24px">Add Trader</h1>`;

  html += `<div style="display:flex;gap:16px;border-bottom:0.5px solid var(--separator);margin-bottom:24px;padding:0 24px">`;
  html += `<button style="padding:8px 0;border:none;border-bottom:2px solid ${tab==='manual'?'var(--accent)':'transparent'};font-size:13px;font-weight:${tab==='manual'?'600':'400'};color:${tab==='manual'?'var(--label)':'var(--label-secondary)'};background:none;cursor:pointer;font-family:inherit" onclick="state.discoveryTab='manual';renderDiscovery()">Manual Entry</button>`;
  html += `<button style="padding:8px 0;border:none;border-bottom:2px solid ${tab==='paste'?'var(--accent)':'transparent'};font-size:13px;font-weight:${tab==='paste'?'600':'400'};color:${tab==='paste'?'var(--label)':'var(--label-secondary)'};background:none;cursor:pointer;font-family:inherit" onclick="state.discoveryTab='paste';renderDiscovery()">Quick Paste</button>`;
  html += `<button style="padding:8px 0;border:none;border-bottom:2px solid ${tab==='file'?'var(--accent)':'transparent'};font-size:13px;font-weight:${tab==='file'?'600':'400'};color:${tab==='file'?'var(--label)':'var(--label-secondary)'};background:none;cursor:pointer;font-family:inherit" onclick="state.discoveryTab='file';renderDiscovery()">Import File</button>`;
  html += `</div>`;

  if(tab === 'manual') {

  } else if(tab === 'file') {

  } else {
    html += renderQuickPaste();
  }

  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

let parsedFileData=[];

async function handleFileUpload(input){
  const file=input.files[0];
  if(!file) return;
  document.getElementById('file-info').innerHTML=`<strong>${Utils.escapeHtml(file.name)}</strong> (${(file.size/1024).toFixed(1)} KB)`;
  document.getElementById('file-preview').innerHTML='Parsing...';
  try{
    const formData=new FormData();
    formData.append('file',file);
    formData.append('filename',file.name);
    const res=await fetch('/api/parse-file',{method:'POST',body:formData});
    const data=await res.json();
    if(!res.ok){ throw new Error(data.detail||'Parse failed'); }
    parsedFileData=data.rows;
    renderFilePreview(data);
  }catch(e){
    document.getElementById('file-preview').innerHTML=`<span style="color:var(--sys-red)">Error: ${Utils.escapeHtml(e.message)}</span>`;
    document.getElementById('import-file-btn').disabled=true;
  }
}

function renderFilePreview(data){
  if(!data.rows.length){
    document.getElementById('file-preview').innerHTML='No rows found.';
    return;
  }
  let html=`<div style="font-size:12px;color:var(--label-secondary);margin-bottom:12px">${data.count} traders found</div>`;
  html+=`<div style="max-height:400px;overflow-y:auto">`;
  html+=`<table style="width:100%;font-size:12px;border-collapse:collapse">`;
  html+=`<tr style="border-bottom:1px solid var(--separator)"><th style="text-align:left;padding:6px 8px;color:var(--label-secondary)">Name</th><th style="text-align:left;padding:6px 8px;color:var(--label-secondary)">Platform</th><th style="text-align:left;padding:6px 8px;color:var(--label-secondary)">Status</th><th style="text-align:left;padding:6px 8px;color:var(--label-secondary)">Profile</th></tr>`;
  data.rows.slice(0,50).forEach(r=>{
    html+=`<tr style="border-bottom:1px solid var(--separator)"><td style="padding:6px 8px;color:var(--label)">${Utils.escapeHtml(r.trader_name||'-')}</td><td style="padding:6px 8px;color:var(--label)">${Utils.escapeHtml(r.platform||'-')}</td><td style="padding:6px 8px"><span class="pill pill-gray">${Utils.escapeHtml(r.status||'-')}</span></td><td style="padding:6px 8px"><a href="${Utils.escapeHtml(r.profile_url||'')}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:11px">${r.profile_url?'Link':'-'}</a></td></tr>`;
  });
  if(data.rows.length>50) html+=`<tr><td colspan="4" style="padding:6px 8px;color:var(--label-tertiary);text-align:center">...and ${data.rows.length-50} more</td></tr>`;
  html+=`</table></div>`;
  document.getElementById('file-preview').innerHTML=html;
  document.getElementById('import-file-btn').disabled=false;
  document.getElementById('file-count').textContent=`${data.count} traders`;
}

async function importFileTraders(){
  if(!parsedFileData.length) return;
  try{
    await API.importData({traders:parsedFileData});
    showToast(`Imported ${parsedFileData.length} traders`);
    await refreshData();
    navigate('traders');
  }catch(e){
    showToast('Import failed: '+e.message,'error');
  }
}

async function saveWeights(){ const w={}; document.querySelectorAll('input[data-key]').forEach(inp=>w[inp.dataset.key]=parseFloat(inp.value)); const updates={}; Object.entries(w).forEach(([k,v])=>updates[`scoring_weights.${k}`]=v.toString()); await API.saveSettings(updates); showToast('Weights saved'); }
function togglePlatform(p,checked){ const current=JSON.parse(state.settings['platforms.enabled']||'[]'); if(checked){ current.push(p); }else{ const idx=current.indexOf(p); if(idx>-1) current.splice(idx,1); } state.settings['platforms.enabled']=JSON.stringify([...new Set(current)]); }

window.addEventListener('load',async()=>{ try{ await refreshData(); state.lastSeenTraderId=state.traders[0]?.id; setInterval(pollNewTraders,10000); render(); } catch(e){ state.serverConnected=false; updateConnectionBanner(); } });
window.onpopstate=()=>{};
</script>
